name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Отменяем устаревший прогон если на ту же ветку прилетел новый push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build (type-check prod)
        run: npm run build

      - name: Type-check tests
        run: npm run typecheck

      - name: Run unit tests
        run: npm test
